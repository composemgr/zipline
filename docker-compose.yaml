# nginx proxy address - http://172.17.0.1:3007

name: zipline
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  zipline:
    image: ghcr.io/diced/zipline:latest
    pull_policy: always
    container_name: zipline-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - zipline
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:3007:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: zipline-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      DATABASE_URL: postgres://${DB_USER_NAME:-zipline}:${DB_USER_PASS:-changeme_db_password}@zipline-db:5432/${DB_CREATE_DATABASE_NAME:-zipline}
      CORE_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      CORE_HOSTNAME: 0.0.0.0
      CORE_PORT: 3000
    volumes:
      - ./volumes/data/zipline/uploads:/zipline/uploads
      - ./volumes/data/zipline/public:/zipline/public
      - ./volumes/data/zipline/themes:/zipline/themes
    depends_on:
      zipline-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://zipline-app:3000'
      - 'cloudflare.hostname=zipline.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.zipline-app.entrypoints=http'
      - 'traefik.http.routers.zipline-app-secure.tls=true'
      - 'traefik.http.routers.zipline-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.zipline-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.zipline-app.middlewares=zipline-app-https-redirect'
      - 'traefik.http.routers.zipline-app-secure.entrypoints=https'
      - 'traefik.http.routers.zipline-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.zipline-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.zipline-app-secure.service=zipline-app'
      - 'traefik.http.services.zipline-app.loadbalancer.server.port=3000'

  zipline-db:
    image: postgres:latest
    pull_policy: always
    container_name: zipline-db
    restart: always
    logging: *default-logging
    networks:
      - zipline
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: zipline-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-zipline}
      POSTGRES_USER: ${DB_USER_NAME:-zipline}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/zipline:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zipline:
    name: zipline
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
